name: 每周监控 puerhdirect.com 变化

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓取上游页面并对比变化
        run: node scripts/monitor-upstream.mjs

      - name: 提交快照更新
        if: success()
        run: |
          git config user.name "puerh-web"
          git config user.email "puerh-web@users.noreply.github.com"
          git add upstream-snapshots/
          git diff --staged --quiet || (git commit -m "chore: 更新上游快照 $(date +%Y-%m-%d)" && git push)
