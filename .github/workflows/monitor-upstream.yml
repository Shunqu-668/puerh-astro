name: 每周监控 puerhdirect.com 变化

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 构建本站（用于对比）
        run: |
          npm ci
          npm run build

      - name: 抓取上游并对比本站
        run: node scripts/monitor-upstream.mjs
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 上传对比报告
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-monitor-report
          path: upstream-snapshots/LATEST-REPORT.md
